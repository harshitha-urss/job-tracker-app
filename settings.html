<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="ds-shell">

<header class="ds-header">
    <div class="ds-header__inner">
        <h1>Job Notification App</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="saved.html">Saved</a>
            <a href="digest.html">Digest</a>
            <a href="settings.html" class="active">Settings</a>
            <a href="proof.html">Proof</a>
            <a href="test.html">Test</a>
        </nav>
        <button onclick="toggleDarkMode()">🌙</button>
    </div>
</header>

<main class="ds-container">

<section class="ds-card">
<h2>Set Your Preferences</h2>

<div class="ds-form">

<label>Role Keywords</label>
<input id="roleKeywords" placeholder="React, Backend">

<label>Preferred Locations</label>
<select id="preferredLocations" multiple>
  <option>Bangalore</option>
  <option>Hyderabad</option>
  <option>Chennai</option>
  <option>Pune</option>
  <option>Remote</option>
</select>

<label>Mode</label>
<label><input type="checkbox" value="Remote" class="mode"> Remote</label>
<label><input type="checkbox" value="Hybrid" class="mode"> Hybrid</label>
<label><input type="checkbox" value="Onsite" class="mode"> Onsite</label>

<label>Experience Level</label>
<select id="experience">
  <option value="">Any</option>
  <option value="Fresher">Fresher</option>
  <option value="0-1">0-1</option>
  <option value="1-3">1-3</option>
  <option value="3-5">3-5</option>
</select>

<label>Skills</label>
<input id="skills" placeholder="JavaScript, SQL">

<label>Minimum Match Score</label>
<input type="range" id="minScore" min="0" max="100" value="40">

<!-- NEW: SHOW VALUE -->
<span id="scoreValue">40</span>

<button onclick="savePreferences()" class="ds-btn ds-btn--primary">Save Preferences</button>
<button onclick="resetPreferences()" class="ds-btn">
  Reset Preferences
</button>

</div>

</section>

</main>

</div>

<script src="app.js"></script>
</body>
</html>
